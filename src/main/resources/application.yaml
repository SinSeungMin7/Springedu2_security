server:
  port: 9090

spring:
  application:
    name: springedu2

  # datasource 설정 (기존 주석 보존 및 들여쓰기 교정)
  #  datasource:
  #    driver-class-name: oracle.jdbc.OracleDriver
  #    url: jdbc:oracle:thin:@localhost:1521:xe
  #    username: spring
  #    password: 1234

  #  datasource:
  #    driver-class-name: com.mysql.cj.jdbc.Driver
  #    url: jdbc:mysql://localhost:3306/edudb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
  #    # url: jdbc:mysql://mysql-container:3306/edudb?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
  #    username: jdbctest
  #    password: jdbctest

  # 활성화된 PostgreSQL 설정 (spring: 아래로 공백 2칸 들여쓰기 완료)
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/edudb
    username: jdbctest
    password: jdbctest

  # JPA 설정 (spring: 아래로 공백 2칸 들여쓰기 완료)
  jpa:
    # database-platform: org.hibernate.dialect.MySQLDialect
    # database-platform: org.hibernate.dialect.OracleDialect
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace